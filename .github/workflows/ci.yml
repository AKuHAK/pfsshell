name: Continuous Integration
on:
  push:
    paths:
      - "**.c"
      - "**.h"
      - "**.cpp"
      - "**.hpp"
      - "**.build"
      - "**.in"
      - "**.yml"
  pull_request:
    paths:
      - "**.c"
      - "**.h"
      - "**.cpp"
      - "**.hpp"
      - "**.build"
      - "**.in"
      - "**.yml"

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependancies
        run: |
          sudo apt-get update
          sudo apt-get install build-essential expect pkg-config fuse libfuse-dev

      - uses: actions/setup-python@v3
        with:
          python-version: "3.x"

      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip
          restore-keys: |
            ${{ runner.os }}-pip

      - run: python -m pip install --upgrade meson ninja

      - name: Build pfs2tar
        run: |
          rm -rf build/
          meson setup build/ -Denable_pfs2tar=true
          meson compile -C build

      - uses: actions/upload-artifact@master
        with:
          name: pfs2tar-ubuntu
          path: build/pfs2tar

  build-pfsfuse-win32:
    runs-on: windows-latest
    defaults:
     run:
      shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install MSYS2 packages
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          install: |
            base-devel git make texinfo patch binutils mpc-devel p7zip mingw-w64-i686-gcc
            mingw-w64-i686-cmake mingw-w64-i686-make mingw-w64-i686-meson
          update: true

      - name: Build pfs2tar
        run: |
          meson setup build/ -Denable_pfs2tar=true
          meson compile -C build

      - uses: actions/upload-artifact@master
        with:
          name: pfs2tar-win32
          path: |
            build/pfs2tar.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v3
        with:
          python-version: "3.x"

      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip
          restore-keys: |
            ${{ runner.os }}-pip

      - run: python -m pip install --upgrade meson ninja

      - run: brew install macfuse coreutils

      - uses: actions/upload-artifact@master
        with:
          name: pfsshell-macos
          path: build/pfsshell

      - run: |
          rm -rf build/
          meson setup build/ -Denable_pfs2tar=true
          meson compile -C build

      - uses: actions/upload-artifact@master
        with:
          name: pfs2tar-macos
          path: build/pfs2tar
